<!DOCTYPE html>
<html lang="en-nz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ava Road Route Tool</title>

  <style>
    :root{
      --mint: #98FB98;
      --mint-soft: #eaffe7;
      --card-bg: #ffffff;
      --muted: #6b6b6b;
      --text: #1b1b1b;
      --primary: #2b8a8a;
      --primary-contrast: #ffffff;
      --danger: #e05858;
      --input-border: #d7d7d7;
      --shadow: 0 8px 28px rgba(15,15,15,0.06);
      --radius-lg: 14px;
      --radius-md: 8px;
      --max-width: 840px;
      --gap: 12px;
      --control-height: 40px;
      --max-zones: 10;
    }

    html,body{
      height:100%;
      margin:0;
      font-family: Inter, "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      color:var(--text);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0.55)),
        radial-gradient(60% 60% at 10% 10%, rgba(152,251,152,0.10), transparent 15%),
        var(--mint);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      box-sizing:border-box;
    }

    .wrap{
      width:100%;
      max-width:var(--max-width);
      background:linear-gradient(180deg, var(--card-bg), var(--mint-soft));
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow);
      padding:20px;
      box-sizing:border-box;
      border: 1px solid rgba(0,0,0,0.03);
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    h1{
      font-size:20px;
      margin:0;
      color:var(--text);
      letter-spacing:0.2px;
    }

    .muted { color:var(--muted); font-size:13px; }

    .col { display:flex; flex-direction:column; gap:8px; }

    .controls {
      display:flex;
      gap:var(--gap);
      align-items:center;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    label.small{
      font-size:12px;
      color:var(--muted);
    }

    input[type="text"], input[type="number"], select {
      height:var(--control-height);
      padding:8px 12px;
      border-radius:var(--radius-md);
      border:1px solid var(--input-border);
      font-size:14px;
      outline:none;
      transition: box-shadow .15s ease, border-color .12s ease, transform .08s ease;
      background: #fff;
      color:var(--text);
      min-width:120px;
      box-sizing:border-box;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      box-shadow: 0 6px 18px rgba(43,138,138,0.12);
      border-color: rgba(43,138,138,0.8);
      transform: translateY(-1px);
    }

    #zones-container{
      margin-bottom:14px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .zone-row{
      display:grid;
      grid-template-columns: 1fr 56px;
      gap:8px;
      align-items:center;
    }

    .zone-row input {
      height:44px;
      padding:10px 12px;
      font-size:15px;
      border-radius:10px;
      text-transform:uppercase;
    }

    .btn {
      height:44px;
      padding:10px 14px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      font-weight:600;
      font-size:14px;
      transition: transform .08s ease, box-shadow .12s ease, opacity .12s ease, filter .12s ease;
    }

    .btn:active { transform: translateY(1px); }

    .add-zone-row {
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    #add-zone {
      background: linear-gradient(180deg, var(--primary), #1f6f6f);
      color: var(--primary-contrast);
      border-radius: 10px;
      padding:9px 14px;
      box-shadow: 0 6px 16px rgba(43,138,138,0.12);
      margin:0;
    }

    #add-zone[disabled] { opacity:0.6; cursor:not-allowed; box-shadow:none; }

    .add-note {
      color:var(--muted);
      font-size:13px;
      line-height:1;
      white-space:nowrap;
    }

    .remove-btn{
      width:56px;
      height:44px;
      border-radius:10px;
      border:none;
      background:linear-gradient(180deg, #ff7070, #e04f4f);
      color:white;
      font-weight:700;
      cursor:pointer;
      box-shadow: 0 6px 14px rgba(224,79,79,0.12);
    }

    .remove-btn:hover { filter:brightness(.98); }

    .time-row{
      display:flex;
      gap:12px;
      align-items:center;
      margin-top:6px;
      flex-wrap:wrap;
    }

    .time-inputs { display:flex; gap:8px; align-items:center; }

    .result-row {
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:14px;
      flex-wrap:wrap;
    }

    #result{
      flex:1;
      background:linear-gradient(180deg, #fff, #fbfffb);
      padding:14px 16px;
      border-radius:10px;
      border:1px solid var(--input-border);
      font-size:15px;
      color:var(--text);
      min-height:56px;
      box-sizing:border-box;
      overflow:auto;
      word-break:break-all;
      white-space:pre-wrap;
      user-select:text;
      transition: box-shadow .15s ease, transform .08s ease, border-color .12s ease;
    }

    #result.flash {
      box-shadow: 0 8px 24px rgba(43,138,138,0.12);
      border-color: rgba(43,138,138,0.45);
      transform: translateY(-1px);
    }

    #calculate-button{
      background: linear-gradient(180deg, var(--primary), #1f6f6f);
      color:var(--primary-contrast);
      padding:10px 14px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      font-weight:700;
      box-shadow: 0 8px 24px rgba(43,138,138,0.12);
    }
    #calculate-button:hover { transform: translateY(-2px); }

    #copy-button {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.06);
      padding:8px 10px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      transition: transform .08s ease, opacity .12s ease, background .12s ease;
    }

    #copy-button:hover {
      background: rgba(255,255,255,0.7);
    }

    .copy-msg {
      font-size:13px;
      color:var(--primary);
      margin-left:8px;
      opacity:0;
      transition: opacity .25s ease;
    }

    .copy-msg.show { opacity:1; }

    .error-msg{
      margin-top:10px;
      color:var(--danger);
      font-size:13px;
      min-height:18px;
    }

    @media (max-width:720px) {
      .wrap { padding:16px; }
      .controls { flex-direction:column; align-items:stretch; gap:10px; }
      .controls .col { width:100%; }
      .col input, .col select { width:100%; min-width:0; }

      .add-zone-row { flex-direction:column; align-items:stretch; gap:8px; }
      #add-zone { width:100%; }

      .zone-row { grid-template-columns: 1fr 48px; gap:6px; }
      .zone-row input { height:48px; font-size:16px; padding:12px; }
      .remove-btn { width:48px; height:48px; border-radius:8px; }

      .time-row { flex-direction:column; align-items:stretch; gap:8px; }
      .time-inputs { width:100%; }

      .result-row { flex-direction:column; align-items:stretch; gap:10px; }
      #result { min-height:84px; padding:12px; font-size:16px; }
      #calculate-button, #copy-button { width:100%; display:block; }

      .btn, #copy-button { height:52px; font-size:16px; border-radius:10px; }

      .add-note { text-align:left; font-size:13px; }

      h1 { font-size:18px; }
    }

    @media (max-width:420px) {
      body { padding:16px; }
      .wrap { padding:12px; border-radius:12px; }
      .zone-row input { font-size:15px; height:50px; }
      .add-note { font-size:12px; }
      #result { font-size:15px; min-height:100px; }
      #calculate-button, #copy-button { height:52px; font-size:15px; }
    }

    @media (min-width:721px) {
      .controls { flex-direction:row; align-items:center; }
      .result-row { flex-direction:row; align-items:center; }
      .add-zone-row { flex-direction:row; align-items:center; }
      .zone-row { grid-template-columns: 1fr 56px; }
      #result { min-height:56px; }
    }
  </style>
</head>

<body>
  <div class="wrap" role="main" aria-labelledby="title">
    <header>
      <div>
        <h1 id="title">mathsuki's Ava Route Tool</h1>
      </div>
      <div class="muted" aria-hidden="true">v2</div>
    </header>

    <div class="controls" style="margin-top:12px;">
      <div class="col" style="min-width:180px;">
        <label class="small" for="fromwhere">From where</label>
        <input id="fromwhere" type="text" placeholder="from zone" aria-label="From where" />
      </div>

      <div class="col" style="min-width:180px;">
        <label class="small" for="towhere">To where</label>
        <input id="towhere" type="text" placeholder="to zone" aria-label="To where" />
      </div>

      <div class="col">
        <label class="small" for="zonetype">Zone Type</label>
        <select id="zonetype" aria-label="Zone type">
          <option value="">zone type</option>
          <option value="Outlands">Outlands</option>
          <option value="Royal City">Royal City</option>
        </select>
      </div>

      <div class="col">
        <label class="small" for="city">City</label>
        <select id="city" aria-label="City">
          <option value="">city</option>
          <option value="FS">Fort Sterling</option>
          <option value="ML">Martlock</option>
          <option value="BW">Bridgewatch</option>
          <option value="TH">Thetford</option>
          <option value="LY">Lymhurst</option>
          <option value="Brecilien">Brecilien</option>
        </select>
      </div>
    </div>

    <div id="zones-container" aria-live="polite"></div>

    <div class="add-zone-row">
      <button id="add-zone" class="btn" aria-label="Add zone">+ Add Zone</button>
      <div class="add-note" id="add-note">Up to 10 zones</div>
    </div>

    <div class="time-row">
      <div class="time-inputs">
        <div class="col">
          <label class="small" for="lowHours">Shortest Remaining Timer</label>
          <div style="display:flex; gap:8px; align-items:center;">
            <input id="lowHours" type="number" min="0" max="23" value="0" aria-label="Lowest hours" style="width:88px;" /> <span class="muted">h</span>
            <input id="lowMins" type="number" min="0" max="59" value="0" aria-label="Lowest minutes" style="width:88px;" /> <span class="muted">m</span>
          </div>
        </div>
      </div>
      <div style="flex:1"></div>
    </div>

    <div class="error-msg" id="error-msg" aria-live="polite"></div>

    <div class="result-row">
      <div id="result" role="textbox" aria-readonly="true" aria-label="Generated output"></div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button id="calculate-button" class="btn" aria-label="Generate discord string">Generate</button>
        <button id="copy-button" title="Copy" aria-label="Copy generated string">Copy</button>
      </div>
    </div>

    <div style="margin-top:12px; display:flex; align-items:center;">
      <div class="muted">Guide: Add zone initials, input timer, generate, then copy to Discord.</div>
      <div class="copy-msg" id="copy-msg">Copied!</div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const maxZones = Number(getComputedStyle(document.documentElement).getPropertyValue('--max-zones')) || 10;
      let zoneCount = 0;
      const zones = {};

      const zonesContainer = document.getElementById('zones-container');
      const addZoneBtn = document.getElementById('add-zone');
      const addNoteEl = document.getElementById('add-note');
      const resultEl = document.getElementById('result');
      const copyBtn = document.getElementById('copy-button');
      const copyMsg = document.getElementById('copy-msg');
      const errorMsg = document.getElementById('error-msg');
      const generateBtn = document.getElementById('calculate-button');

      function updateAddNote() {
        const slotsLeft = Math.max(0, maxZones - zoneCount);
        addNoteEl.textContent = slotsLeft > 0
          ? `${slotsLeft} zone slot${slotsLeft === 1 ? '' : 's'} left`
          : 'Up to 10 zones';
      }

      function setError(message) {
        errorMsg.textContent = message || '';
      }

      function flashResult() {
        resultEl.classList.add('flash');
        setTimeout(() => resultEl.classList.remove('flash'), 180);
      }

      function forceUppercaseInput(inputEl) {
        inputEl.addEventListener('input', (e) => {
          e.target.value = e.target.value.toUpperCase();
        });
      }

      forceUppercaseInput(document.getElementById('fromwhere'));
      forceUppercaseInput(document.getElementById('towhere'));

      function createZoneRow(i) {
        const row = document.createElement('div');
        row.className = 'zone-row';
        row.dataset.index = i;

        row.innerHTML = `
          <input id="zone${i}-name" type="text" placeholder="e.g. SAO" aria-label="Zone ${i} initials">
          <button class="remove-btn" title="Remove zone" aria-label="Remove zone ${i}">–</button>
        `;

        zones[i] = { name: '' };
        zonesContainer.appendChild(row);

        const input = document.getElementById(`zone${i}-name`);
        forceUppercaseInput(input);

        input.addEventListener('input', (e) => {
          zones[i].name = (e.target.value || '').trim().toUpperCase();
        });

        row.querySelector('.remove-btn').addEventListener('click', () => {
          row.remove();
          delete zones[i];
          zoneCount = Math.max(0, zoneCount - 1);
          addZoneBtn.disabled = false;
          updateAddNote();
        });

        updateAddNote();
      }

      function addZone() {
        if (zoneCount < maxZones) {
          zoneCount++;
          createZoneRow(zoneCount);
          if (zoneCount === maxZones) addZoneBtn.disabled = true;
          updateAddNote();
        }
      }

      function Run() {
        setError('');

        const fromWhere = (document.getElementById('fromwhere').value || '').trim().toUpperCase();
        const toWhere = (document.getElementById('towhere').value || '').trim().toUpperCase();
        const type = document.getElementById('zonetype').value;
        const city = document.getElementById('city').value || '';

        if (!fromWhere) {
          setError('Please fill in From where.');
          resultEl.textContent = '';
          return;
        }

        if (city !== 'Brecilien' && !toWhere) {
          setError('Please fill in To where.');
          resultEl.textContent = '';
          return;
        }

        const ordered = Object.keys(zones).map(Number).sort((a, b) => a - b);
        const zoneList = ordered
          .map(i => (zones[i].name || '').trim().toUpperCase())
          .filter(Boolean);

        const hours = +document.getElementById('lowHours').value || 0;
        const mins = +document.getElementById('lowMins').value || 0;
        const ts = Math.floor(Date.now() / 1000) + hours * 3600 + mins * 60;

        let destination = '';
        if (city === 'Brecilien') {
          destination = 'BRECILIEN';
        } else {
          let cityOut = city;
          if (type === 'Outlands' && cityOut) {
            cityOut = cityOut + 'P';
          }
          destination = cityOut ? `${toWhere}(${cityOut})` : toWhere;
        }

        const output = [
          `**${fromWhere}**`,
          ...zoneList,
          `**${destination}** <t:${ts}:R>`
        ];

        resultEl.textContent = output.join(' - ');
        flashResult();
      }

      function copyOutput() {
        const text = resultEl.textContent || '';
        if (!text) return;

        const done = () => {
          copyMsg.classList.add('show');
          setTimeout(() => copyMsg.classList.remove('show'), 1100);
        };

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done).catch((err) => {
            console.error('copy failed', err);
          });
          return;
        }

        try {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'absolute';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
          done();
        } catch (err) {
          console.error('copy failed', err);
        }
      }

      addZone();
      updateAddNote();

      addZoneBtn.addEventListener('click', addZone);
      generateBtn.addEventListener('click', Run);
      copyBtn.addEventListener('click', copyOutput);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const active = document.activeElement;
          if (active && (active.tagName === 'INPUT' || active.tagName === 'SELECT')) {
            e.preventDefault();
            Run();
          }
        }
      });
    });
  </script>
</body>
</html>
